<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DailyNotion</title>
    <link rel="stylesheet" href="/src/index.css" />
  </head>
  <body>
    <div id="root">
      <div style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; background: #fff;">
        <div style="text-align: center;">
          <div style="width: 40px; height: 40px; border: 4px solid #c8dfaa; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px;"></div>
          <div style="color: #28262a; font-size: 16px; font-weight: 500;">Loading DailyNotion...</div>
        </div>
      </div>
      <style>
        @keyframes spin { to { transform: rotate(360deg); } }
      </style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
    // SPA redirect - convert /path to /#/path for hash-based routing
    if (!location.pathname.startsWith('/assets') && !location.hash) {
      location.hash = location.pathname + location.search;
    }
    </script>
  </body>
</html>
