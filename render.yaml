services:
  - type: web
    name: dailynotion-frontend
    env: node
    region: oregon
    buildCommand: npm install && npm run build
    startCommand: node server.js
    healthCheckPath: /
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_API_URL
        value: https://dailynotion-backend.onrender.com
